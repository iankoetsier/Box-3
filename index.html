<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box 3 Collegezaal Game</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-card { background: white; max-width: 400px; width: 100%; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; margin-top: 0; font-size: 24px; }
        .stat-box { background: #eff6ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 18px; font-weight: bold; color: #1e40af; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #374151; font-size: 14px; }
        input[type="range"] { width: 100%; margin-bottom: 5px; }
        .slider-val { font-weight: bold; color: #2563eb; }
        button { width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #059669; }
        .result { display: none; margin-top: 20px; padding: 15px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; }
        .chance-box { display: none; margin-top: 20px; padding: 15px; background: #fff7ed; border-radius: 8px; border: 1px solid #ffedd5; }
        .error { color: #dc2626; font-size: 14px; margin-top: 5px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Box 3 Meester 💸</h1>
    <div class="stat-box">Beschikbaar Budget: <span id="budgetDisplay">€150.000</span></div>
    
    <div class="input-group">
        <label>Spaargeld (Fictief rendement: 1,28%): <span class="slider-val" id="valSavings">€50.000</span></label>
        <input type="range" id="savings" min="0" max="150000" step="5000" value="50000" oninput="updateSliders()">
    </div>

    <div class="input-group">
        <label>Beleggingen & Crypto (Fictief rendement: 6,00%): <span class="slider-val" id="valInvestments">€50.000</span></label>
        <input type="range" id="investments" min="0" max="150000" step="5000" value="50000" oninput="updateSliders()">
    </div>

    <div class="input-group">
        <label>Groen Sparen (Extra Vrijstelling!): <span class="slider-val" id="valGreen">€50.000</span></label>
        <input type="range" id="green" min="0" max="150000" step="5000" value="50000" oninput="updateSliders()">
    </div>

    <div id="errorMsg" class="error"></div>
    <button onclick="calculateTax()" style="margin-top: 10px;">Dien Belastingaangifte In</button>

    <!-- Kanskaart Display Box -->
    <div id="chanceCardBox" class="chance-box">
        <h3 style="margin-top:0; color:#c2410c;">⚡ Kanskaart getrokken!</h3>
        <p id="chanceText" style="font-style:italic; color:#7c2d12; margin-bottom:0;"></p>
    </div>

    <div id="resultBox" class="result">
        <h3 style="margin-top:0; color:#166534;">De Belastingdienst heeft gesproken:</h3>
        <p>Grondslag na vrijstelling: <strong id="resGrondslag">€0</strong></p>
        <p>Berekend Fictief Rendement: <strong id="resRendement">€0</strong></p>
        <p>Te betalen Box 3 belasting (36%): <span style="color:#dc2626; font-weight:bold;" id="resTax">€0</span></p>
        <p>Jouw Netto Eindvermogen: <span style="color:#166534; font-weight:bold;" id="resNetto">€0</span></p>
    </div>
</div>

<script>
        const TOTAL_BUDGET = 150000;
    const VRIJSTELLING = 59357;

    function updateSliders() {
        let savings = parseInt(document.getElementById('savings').value);
        let investments = parseInt(document.getElementById('investments').value);
        let green = parseInt(document.getElementById('green').value);
        
        let currentTotal = savings + investments + green;
        let remaining = TOTAL_BUDGET - currentTotal;

        document.getElementById('valSavings').innerText = "€" + savings.toLocaleString('nl-NL');
        document.getElementById('valInvestments').innerText = "€" + investments.toLocaleString('nl-NL');
        document.getElementById('valGreen').innerText = "€" + green.toLocaleString('nl-NL');

        let errorBox = document.getElementById('errorMsg');
        if (remaining < 0) {
            errorBox.innerText = "Je hebt €" + Math.abs(remaining).toLocaleString('nl-NL') + " te veel uitgegeven!";
        } else if (remaining > 0) {
            errorBox.innerText = "Je hebt nog €" + remaining.toLocaleString('nl-NL') + " over om te verdelen.";
        } else {
            errorBox.innerText = "";
        }
        document.getElementById('budgetDisplay').innerText = "€" + remaining.toLocaleString('nl-NL');
    }

    function calculateTax() {
        let savings = parseInt(document.getElementById('savings').value);
        let investments = parseInt(document.getElementById('investments').value);
        let green = parseInt(document.getElementById('green').value);

        if ((savings + investments + green) !== TOTAL_BUDGET) {
            alert("Verdeel eerst exact je gehele budget van €150.000!");
            return;
        }

        // --- DEFINITIE VAN DE 10 KANSKAARTEN ---
        const kanskaarten = [
            { id: 0, text: "⚠️ CRYPTO CRASH! Je beleggingen halveren direct ná 1 januari. De Belastingdienst rekent echter met de peildatum, dus je betaalt belasting over geld dat je niet meer hebt!", effect: (s, i, g) => ({ savings: s, investments: i * 0.5, green: g }) },
            { id: 1, text: "📉 PRINSJESDAG PANIEK: De overheid verlaagt onverwacht de heffingsvrije grens naar €51.396. Je betaalt sneller belasting!", effect: (s, i, g) => ({ vrijstelling: 51396 }) },
            { id: 2, text: "🌱 GROENE SUBSIDIE: Het klimaatdoel moet gehaald worden. Je volledige Groene Spaargeld is nu 100% vrijgesteld, ongeacht het oude maximum van €57.000!", effect: (s, i, g) => ({ groenVrij: g }) },
            { id: 3, text: "💸 RENTESTIJSGING: De inflatie dwingt de banken tot actie. Het fictieve rendement op sparen stijgt direct naar 3,50%!", effect: (s, i, g) => ({ rendSparen: 0.035 }) },
            { id: 4, text: "⚖️ HOGE RAAD GRIJPT IN: Je maakt dit jaar aantoonbaar verlies op je beleggingen. Dankzij de Tegenbewijsregeling hoef je €0 belasting te betalen!", effect: (s, i, g) => ({ tegenbewijs: true }) },
            { id: 5, text: "💍 FISCAAL PARTNERSCHAP: Je vindt de liefde van je leven (en fiscaal voordeel)! Je heffingsvrije vermogen verdubbelt direct naar €118.714.", effect: (s, i, g) => ({ vrijstelling: 118714 }) },
            { id: 6, text: "💼 BOX 3 BEURSSUCCES: De aandelenmarkt explodeert! Je werkelijke vermogen in beleggingen stijgt direct met 20% vóórdat de fiscus kijkt.", effect: (s, i, g) => ({ savings: s, investments: i * 1.2, green: g }) },
            { id: 7, text: "🏢 REVOLUTIE VASTGOED: De overheid verhoogt het fictief rendement voor overige bezittingen extreem naar 7.5%. Beleggen wordt zwaarder belast!", effect: (s, i, g) => ({ rendBeleggen: 0.075 }) },
            { id: 8, text: "🔍 BELASTINGCONTROLE: De fiscus vindt een oude buitenlandse rekening. Je krijgt een naheffing en boete van €4.500 op je netto eindvermogen.", effect: (s, i, g) => ({ boete: 4500 }) },
            { id: 9, text: "💰 ERFENIS ONTVANGEN: Je ontvangt een belastingvrije erfenis van €25.000 die direct wordt toegevoegd aan je spaarsaldo.", effect: (s, i, g) => ({ savings: s + 25000, investments: i, green: g }) }
        ];

        // --- SIMULATIE LUS (6 REPETITIES) ---
        let cumulatieveBelasting = 0;
        let getrokkenKaartenTekst = "";
        let huidigVermogen = { savings: savings, investments: investments, green: green };

        for (let ronde = 1; ronde <= 6; ronde++) {
            // Basiswaarden resetten per ronde op basis van de huidige vermogensstand
            let actueleVrijstelling = VRIJSTELLING;
            let fictiefRendementSparen = 0.0128;
            let fictiefRendementBeleggen = 0.06;
            let effectieveGroenVrijstelling = Math.min(huidigVermogen.green, 57000);
            let tegenbewijsRegeling = false;
            let incidenteleBoete = 0;

            // Trek een willekeurige kaart uit de 10 opties
            let randomIdx = Math.floor(Math.random() * kanskaarten.length);
            let kaart = kanskaarten[randomIdx];
            
            // Log de gebeurtenis van deze ronde
            getrokkenKaartenTekst += `<strong>Ronde ${ronde}:</strong> ${kaart.text}<br><br>`;

            // Pas het effect van de getrokken kaart toe
            let resultaatKanskaart = kaart.effect(huidigVermogen.savings, huidigVermogen.investments, huidigVermogen.green);
            
            if (resultaatKanskaart.savings !== undefined) {
                huidigVermogen.savings = resultaatKanskaart.savings;
                huidigVermogen.investments = resultaatKanskaart.investments;
                huidigVermogen.green = resultaatKanskaart.green;
            }
            if (resultaatKanskaart.vrijstelling !== undefined) actueleVrijstelling = resultaatKanskaart.vrijstelling;
            if (resultaatKanskaart.groenVrij !== undefined) effectieveGroenVrijstelling = resultaatKanskaart.groenVrij;
            if (resultaatKanskaart.rendSparen !== undefined) fictiefRendementSparen = resultaatKanskaart.rendSparen;
            if (resultaatKanskaart.rendBeleggen !== undefined) fictiefRendementBeleggen = resultaatKanskaart.rendBeleggen;
            if (resultaatKanskaart.tegenbewijs !== undefined) tegenbewijsRegeling = resultaatKanskaart.tegenbewijs;
            if (resultaatKanskaart.boete !== undefined) incidenteleBoete = resultaatKanskaart.boete;

            // Bereken de totale bezittingen aan het einde van dit jaar
            let subTotaalBudget = huidigVermogen.savings + huidigVermogen.investments + huidigVermogen.green;
            let belastbaarVermogen = subTotaalBudget - effectieveGroenVrijstelling;
            let grondslag = Math.max(0, belastbaarVermogen - actueleVrijstelling);

            // Fictief rendement berekenen
            let rendementSparen = huidigVermogen.savings * fictiefRendementSparen;
            let rendementBeleggen = huidigVermogen.investments * fictiefRendementBeleggen;
            let rendementGroen = (huidigVermogen.green - effectieveGroenVrijstelling) * 0.06;
            let totaalRendement = rendementSparen + rendementBeleggen + rendementGroen;
            
            let weegFactor = belastbaarVermogen > 0 ? (grondslag / belastbaarVermogen) : 0;
            let belastbaarRendement = totaalRendement * weegFactor;
            
            // Belasting bepalen (36%)
            let rondeBelasting = tegenbewijsRegeling ? 0 : (belastbaarRendement * 0.36);
            rondeBelasting += incidenteleBoete;

            // Vermogen bijwerken: trek de verschuldigde belasting af van het spaarsaldo
            huidigVermogen.savings = Math.max(0, huidigVermogen.savings - rondeBelasting);
            cumulatieveBelasting += rondeBelasting;
        }

        // --- BEREKENING EINDRESULTATEN NA 6 RONDEN ---
        let totaalEindVermogen = huidigVermogen.savings + huidigVermogen.investments + huidigVermogen.green;
        let fictieveEindGrondslag = Math.max(0, (totaalEindVermogen - Math.min(huidigVermogen.green, 57000)) - VRIJSTELLING);
        let fictiefEindRendement = (huidigVermogen.savings * 0.0128) + (huidigVermogen.investments * 0.06);

        // Render resultaten naar het scherm
        document.getElementById('chanceText').innerHTML = getrokkenKaartenTekst;
        document.getElementById('chanceCardBox').style.display = 'block';

        document.getElementById('resGrondslag').innerText = "€" + fictieveEindGrondslag.toLocaleString('nl-NL', {maximumFractionDigits: 0});
        document.getElementById('resRendement').innerText = "€" + fictiefEindRendement.toLocaleString('nl-NL', {maximumFractionDigits: 0});
        document.getElementById('resTax').innerText = "€" + cumulatieveBelasting.toLocaleString('nl-NL', {maximumFractionDigits: 0});
        document.getElementById('resNetto').innerText = "€" + totaalEindVermogen.toLocaleString('nl-NL', {maximumFractionDigits: 0});
        
        // Wijzig de header van het resultaatvenster voor duidelijkheid
        document.getElementById('resultBox').getElementsByTagName('h3')[0].innerText = "Resultaat na 6 belastingjaren (Rondes):";
        document.getElementById('resultBox').style.display = 'block';
    }
    }
    }
    
    updateSliders();
</script>

</body>
</html>
